<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pokémon Cards">
    <link rel="apple-touch-icon" href="https://freepngimg.com/thumb/pokemon/88185-emoticon-art-pikachu-yellow-drawing-pixel.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Pokémon TCG Checklist</title>
    <style>
        :root {
            --bg:       #0d0f1a;
            --surface:  #161929;
            --surface2: #1e2236;
            --border:   #252840;
            --border2:  #2e3352;
            --accent:   #f5c542;
            --accent2:  #e07b2a;
            --holo:     #a78bfa;
            --holo2:    #c084fc;
            --text:     #e8eaf0;
            --muted:    #6b7199;
            --check:    #34d399;
            --radius:   10px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 0 0 50px;
            color: var(--text);
        }

        .main-header {
            background: linear-gradient(160deg, #1a1040 0%, #0d0f1a 70%);
            border-bottom: 2px solid var(--accent);
            padding: 28px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 4px 30px rgba(0,0,0,0.7);
        }

        .main-header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(245,197,66,0.5);
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .main-header h1 span {
            display: block;
            font-size: 7px;
            color: var(--muted);
            margin-top: 5px;
        }

        .overall-wrap { margin-top: 14px; }

        .overall-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .overall-label { color: var(--muted); font-weight: 700; }

        .overall-pct {
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: var(--accent);
        }

        .bar-bg {
            background: var(--border2);
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.35s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 0 8px rgba(245,197,66,0.35);
        }

        .set-list { padding: 14px 12px 0; }

        .set-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .set-block.open { border-color: var(--border2); }

        .set-toggle {
            width: 100%;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            display: block;
            text-align: left;
        }

        .set-toggle-inner {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 10px;
        }

        .set-name {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }

        .set-pct {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--accent);
            white-space: nowrap;
        }

        .set-arrow {
            color: var(--muted);
            font-size: 11px;
            transition: transform 0.25s;
            display: inline-block;
        }

        .set-block.open .set-arrow { transform: rotate(180deg); }

        .set-mini-bar-wrap { padding: 0 16px 12px; }

        .set-mini-bar-bg {
            background: var(--border2);
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
        }

        .set-mini-bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.35s ease;
        }

        .set-body {
            display: none;
            border-top: 1px solid var(--border);
        }

        .set-block.open .set-body { display: block; }

        .col-header-row {
            display: grid;
            align-items: center;
            padding: 7px 14px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .col-header-row .h-card { text-align: center; }
        .col-header-row .h-holo { text-align: center; color: var(--holo); }

        .section-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            letter-spacing: 1px;
            color: var(--muted);
            padding: 10px 14px 5px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .pokemon-item {
            display: grid;
            align-items: center;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            min-height: 46px;
            transition: background 0.15s;
        }

        .pokemon-item:last-child { border-bottom: none; }
        .pokemon-item:active { background: var(--surface2); }

        .pokemon-item.row-owned       { background: rgba(52,211,153,0.05);  border-bottom-color: rgba(52,211,153,0.12); }
        .pokemon-item.row-fully-owned { background: rgba(245,197,66,0.06);  border-bottom-color: rgba(245,197,66,0.15); }

        .card-num {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: var(--border2);
        }

        .holo-card .card-num { color: var(--holo); }

        .pokemon-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            padding-right: 4px;
        }

        .row-owned .pokemon-name       { color: var(--check); }
        .row-fully-owned .pokemon-name { color: var(--accent); }

        .check-cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            border: 2px solid var(--border2);
            background: var(--bg);
            cursor: pointer;
            position: relative;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: var(--check);
            border-color: var(--check);
            box-shadow: 0 0 8px rgba(52,211,153,0.4);
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 6px; top: 3px;
            width: 7px; height: 12px;
            border: 2.5px solid #fff;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .holo-cell input[type="checkbox"] {
            border-color: var(--holo);
            box-shadow: 0 0 5px rgba(167,139,250,0.2);
        }

        .holo-cell input[type="checkbox"]:checked {
            background: linear-gradient(135deg, var(--holo), var(--holo2));
            border-color: var(--holo2);
            box-shadow: 0 0 10px rgba(192,132,252,0.5);
        }

        .empty-dash {
            color: var(--border2);
            font-size: 14px;
            text-align: center;
            width: 100%;
            line-height: 46px;
        }

        .g-plain { grid-template-columns: 30px 1fr 50px; }
        .g-holo  { grid-template-columns: 30px 1fr 50px 50px; }

        .reset-wrap { text-align: center; margin-top: 24px; }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted);
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .reset-btn:active { border-color: #ff6b6b; color: #ff6b6b; }
    </style>
</head>

// ─────────────────────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────────────────────
const STORAGE_KEY = 'pokemon_tcg_v2';

function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch(e) { return {}; }
}

function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();

const rk = (id, n) => id + '_' + n + '_r';
const hk = (id, n) => id + '_' + n + '_h';

// ─────────────────────────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────────────────────────
function setProgress(set) {
    const cards = set.cards.filter(c => Array.isArray(c));
    let owned = 0;
    cards.forEach(([n]) => { if (state[rk(set.id, n)]) owned++; });
    return { owned, total: cards.length };
}

function updateOverall() {
    let tot = 0, own = 0;
    SETS.forEach(set => { const p = setProgress(set); tot += p.total; own += p.owned; });
    const pct = tot > 0 ? Math.round((own / tot) * 100) : 0;
    document.getElementById('overallPct').textContent = pct + '%';
    document.getElementById('overallBar').style.width = pct + '%';
}

function updateSetHeader(set) {
    const p   = setProgress(set);
    const pct = p.total > 0 ? Math.round((p.owned / p.total) * 100) : 0;
    const el  = document.getElementById('pct_' + set.id);
    const bar = document.getElementById('bar_' + set.id);
    if (el)  el.textContent = pct + '%';
    if (bar) bar.style.width = pct + '%';
}

// ─────────────────────────────────────────────────────────────
//  ROW STATE
// ─────────────────────────────────────────────────────────────
function getRowClass(set, num, hasHolo, gc) {
    const r = !!state[rk(set.id, num)];
    const h = set.dualPrint && hasHolo && !!state[hk(set.id, num)];
    return 'pokemon-item ' + gc +
        (set.dualPrint && hasHolo ? ' holo-card' : '') +
        (r && h ? ' row-fully-owned' : r ? ' row-owned' : '');
}

function refreshRow(set, num, hasHolo, gc) {
    const row = document.getElementById('row_' + set.id + '_' + num);
    if (row) row.className = getRowClass(set, num, hasHolo, gc);
}

// ─────────────────────────────────────────────────────────────
//  BUILD
// ─────────────────────────────────────────────────────────────
function buildAll() {
    const container = document.getElementById('setList');
    container.innerHTML = '';

    SETS.forEach(set => {
        const gc  = set.dualPrint ? 'g-holo' : 'g-plain';
        const p   = setProgress(set);
        const pct = p.total > 0 ? Math.round((p.owned / p.total) * 100) : 0;

        const block = document.createElement('div');
        block.className = 'set-block';
        block.id = 'block_' + set.id;

        const toggle = document.createElement('button');
        toggle.className = 'set-toggle';
        toggle.innerHTML = `
            <div class="set-toggle-inner">
                <span class="set-name">${set.name}</span>
                <span class="set-pct" id="pct_${set.id}">${pct}%</span>
                <span class="set-arrow">▼</span>
            </div>
            <div class="set-mini-bar-wrap">
                <div class="set-mini-bar-bg">
                    <div class="set-mini-bar-fill" id="bar_${set.id}" style="width:${pct}%"></div>
                </div>
            </div>`;
        toggle.addEventListener('click', () => block.classList.toggle('open'));
        block.appendChild(toggle);

        const body = document.createElement('div');
        body.className = 'set-body';

        // Column header
        const ch = document.createElement('div');
        ch.className = 'col-header-row ' + gc;
        if (set.dualPrint) {
            ch.innerHTML = '<div></div><div></div><div class="h-card">Card</div><div class="h-holo">Holo ✦</div>';
        } else {
            ch.innerHTML = '<div></div><div></div><div class="h-card">Card</div>';
        }
        body.appendChild(ch);

        set.cards.forEach(entry => {
            if (!Array.isArray(entry)) {
                const sh = document.createElement('div');
                sh.className = 'section-label';
                sh.textContent = entry.s;
                body.appendChild(sh);
                return;
            }

            const num     = entry[0];
            const name    = entry[1];
            const hasHolo = set.dualPrint ? !!entry[2] : false;

            const row = document.createElement('div');
            row.id        = 'row_' + set.id + '_' + num;
            row.className = getRowClass(set, num, hasHolo, gc);

            const numEl = document.createElement('div');
            numEl.className = 'card-num';
            numEl.textContent = String(num).padStart(2, '0');

            const nameEl = document.createElement('div');
            nameEl.className = 'pokemon-name';
            nameEl.textContent = name;

            const regCell = document.createElement('div');
            regCell.className = 'check-cell';
            const regCb = document.createElement('input');
            regCb.type = 'checkbox';
            regCb.checked = !!state[rk(set.id, num)];
            regCb.addEventListener('change', () => {
                state[rk(set.id, num)] = regCb.checked;
                saveState(state);
                refreshRow(set, num, hasHolo, gc);
                updateSetHeader(set);
                updateOverall();
            });
            regCell.appendChild(regCb);

            row.appendChild(numEl);
            row.appendChild(nameEl);
            row.appendChild(regCell);

            if (set.dualPrint) {
                const holoCell = document.createElement('div');
                holoCell.className = 'check-cell holo-cell';
                if (hasHolo) {
                    const holoCb = document.createElement('input');
                    holoCb.type = 'checkbox';
                    holoCb.checked = !!state[hk(set.id, num)];
                    holoCb.addEventListener('change', () => {
                        state[hk(set.id, num)] = holoCb.checked;
                        saveState(state);
                        refreshRow(set, num, hasHolo, gc);
                    });
                    holoCell.appendChild(holoCb);
                } else {
                    holoCell.innerHTML = '<div class="empty-dash">—</div>';
                }
                row.appendChild(holoCell);
            }

            body.appendChild(row);
        });

        block.appendChild(body);
        container.appendChild(block);
    });

    updateOverall();
}

function resetAll() {
    if (!confirm('Reset ALL progress across all sets?')) return;
    state = {};
    saveState(state);
    buildAll();
}

buildAll();
</script>
</body>
</html>
